// ─── Utilities ───
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function formatTimer(s) { return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,"0")}`; }
function formatDur(s) { if(s<60) return `${s}s`; const m=Math.floor(s/60); if(m<60) return `${m}m`; return `${Math.floor(m/60)}h ${m%60}m`; }

function formatDate(ts) {
  const d = new Date(ts), now = new Date();
  if (d.getDate()===now.getDate()&&d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()) return "Today";
  const yday = new Date(now); yday.setDate(yday.getDate()-1);
  if (d.getDate()===yday.getDate()&&d.getMonth()===yday.getMonth()) return "Yesterday";
  return d.toLocaleDateString("en-GB", { day:"numeric", month:"short" });
}

function formatFullDate(ts) { return new Date(ts).toLocaleDateString("en-GB", { weekday:"short", day:"numeric", month:"short" }); }

// Epley formula: 1RM = weight × (1 + reps/30)
function calc1RM(weight, reps) {
  if (!weight || !reps || reps < 1) return 0;
  if (reps === 1) return weight;
  return Math.round(weight * (1 + reps / 30));
}

// ─── Storage ───
async function load(key, fb) { try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : fb; } catch { return fb; } }
async function save(key, v) { try { localStorage.setItem(key, JSON.stringify(v)); } catch(e) { console.error(e); } }

// ════════════════════════════════════════════════════════════════
function InlineRestTimer({ duration, onDone }) {
  const [remaining, setRemaining] = useState(duration);
  const [running, setRunning] = useState(true);
  const audioCtx = useRef(null);
  const playBeep = useCallback(() => {
    try { if (!audioCtx.current) audioCtx.current = new (window.AudioContext||window.webkitAudioContext)(); const c=audioCtx.current,o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination);o.frequency.value=880;o.type="sine";g.gain.setValueAtTime(0.3,c.currentTime);g.gain.exponentialRampToValueAtTime(0.01,c.currentTime+0.5);o.start();o.stop(c.currentTime+0.5); } catch{}
  }, []);
  useEffect(() => {
    if (!running||remaining<=0) return;
    const t=setInterval(()=>setRemaining(r=>{if(r<=1){setRunning(false);playBeep();return 0;}return r-1;}),1000);
    return ()=>clearInterval(t);
  }, [running, remaining, playBeep]);
  const pct = duration>0 ? remaining/duration : 0;
  const barColor = pct<0.2 ? RED : pct<0.5 ? AMBER : GREEN;
  return (
    <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:12, padding:"12px 14px", margin:"6px 0", display:"flex", alignItems:"center", gap:12 }}>
      <div style={{ flex:1 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:5 }}>
          <span style={{ fontSize:11, color:"rgba(255,255,255,0.4)", fontFamily:FONT, textTransform:"uppercase", letterSpacing:1 }}>{remaining===0?"Rest complete":"Resting"}</span>
          <span style={{ fontSize:20, fontWeight:300, color:"#fff", fontFamily:MONO, fontVariantNumeric:"tabular-nums" }}>{formatTimer(remaining)}</span>
        </div>
        <div style={{ height:3, background:"rgba(255,255,255,0.06)", borderRadius:2, overflow:"hidden" }}>
          <div style={{ height:"100%", width:`${pct*100}%`, background:barColor, borderRadius:2, transition:"width 1s linear, background 0.5s" }} />
        </div>
      </div>
      <div style={{ display:"flex", gap:5 }}>
        {remaining>0 && <button onClick={()=>setRunning(r=>!r)} style={{ background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:7, color:"rgba(255,255,255,0.4)", fontSize:11, padding:"5px 9px", cursor:"pointer", fontFamily:FONT }}>{running?"Pause":"Resume"}</button>}
        <button onClick={onDone} style={{ background:"rgba(34,197,94,0.1)", border:"1px solid rgba(34,197,94,0.2)", borderRadius:7, color:GREEN, fontSize:11, padding:"5px 9px", cursor:"pointer", fontFamily:FONT }}>{remaining===0?"Next":"Skip"}</button>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  SET ROW
// ════════════════════════════════════════════════════════════════
function SetRow({ set, index, onUpdate, onDelete, onConfirm, confirmed, prevSet }) {
  return (
    <div style={{ padding:"5px 0" }}>
      {prevSet && !confirmed && (
        <div style={{ display:"grid", gridTemplateColumns:"32px 1fr 1fr 40px 40px", gap:8, marginBottom:2 }}>
          <span/><span style={{ fontSize:10, color:"rgba(255,255,255,0.15)", fontFamily:MONO, textAlign:"center" }}>prev: {prevSet.weight}kg</span>
          <span style={{ fontSize:10, color:"rgba(255,255,255,0.15)", fontFamily:MONO, textAlign:"center" }}>prev: {prevSet.reps}</span><span/><span/>
        </div>
      )}
      <div style={{ display:"grid", gridTemplateColumns:"32px 1fr 1fr 40px 40px", gap:8, alignItems:"center", opacity:confirmed?0.5:1 }}>
        <span style={{ color:"rgba(255,255,255,0.25)", fontSize:13, fontFamily:MONO, textAlign:"center" }}>{index+1}</span>
        <div style={{ position:"relative" }}>
          <input type="number" inputMode="decimal" value={set.weight} onChange={e=>onUpdate({...set,weight:e.target.value})} placeholder="0" style={inputBase} disabled={confirmed} />
          <span style={unitLbl}>kg</span>
        </div>
        <div style={{ position:"relative" }}>
          <input type="number" inputMode="numeric" value={set.reps} onChange={e=>onUpdate({...set,reps:e.target.value})} placeholder="0" style={inputBase} disabled={confirmed} />
          <span style={unitLbl}>reps</span>
        </div>
        {!confirmed ? (
          <button onClick={onConfirm} disabled={!set.weight||!set.reps} style={{
            background:set.weight&&set.reps?"rgba(34,197,94,0.15)":"rgba(255,255,255,0.03)", border:set.weight&&set.reps?"1px solid rgba(34,197,94,0.25)":"1px solid rgba(255,255,255,0.06)",
            borderRadius:8, color:set.weight&&set.reps?GREEN:"rgba(255,255,255,0.15)", fontSize:16, cursor:set.weight&&set.reps?"pointer":"default", padding:0, width:36, height:36, display:"flex", alignItems:"center", justifyContent:"center"
          }}>✓</button>
        ) : <span style={{ textAlign:"center", color:GREEN, fontSize:14 }}>✓</span>}
        <button onClick={onDelete} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.1)", fontSize:16, cursor:"pointer", padding:2, borderRadius:6 }}
          onMouseEnter={e=>e.target.style.color=RED} onMouseLeave={e=>e.target.style.color="rgba(255,255,255,0.1)"}>✕</button>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  EXERCISE CARD (workout mode)
// ════════════════════════════════════════════════════════════════
function ExerciseCard({ exercise, onUpdate, onRemove, restDuration, exerciseHistory, notes, onNotesChange }) {
  const [restingAfterSet, setRestingAfterSet] = useState(null);
  const [showNotes, setShowNotes] = useState(false);

  const lastSession = exerciseHistory && exerciseHistory.length > 0 ? exerciseHistory[0] : null;

  const addSet = () => {
    const last = exercise.sets[exercise.sets.length-1];
    onUpdate({...exercise, sets:[...exercise.sets,{weight:last?.weight||"",reps:last?.reps||"",id:uid(),confirmed:false}]});
  };
  const updateSet = (i,set) => { const s=[...exercise.sets]; s[i]=set; onUpdate({...exercise,sets:s}); };
  const deleteSet = (i) => { if(exercise.sets.length<=1) return; onUpdate({...exercise,sets:exercise.sets.filter((_,idx)=>idx!==i)}); };
  const confirmSet = (i) => {
    const s=[...exercise.sets]; s[i]={...s[i],confirmed:true}; onUpdate({...exercise,sets:s});
    if (restDuration>0) setRestingAfterSet(i);
  };

  const vol = exercise.sets.reduce((s,st)=>s+(parseFloat(st.weight)||0)*(parseInt(st.reps)||0),0);
  const best1RM = exercise.sets.reduce((best,st)=>{const rm=calc1RM(parseFloat(st.weight)||0,parseInt(st.reps)||0); return rm>best?rm:best;},0);

  return (
    <div style={card}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
        <div>
          <h3 style={{ margin:0, fontSize:15, fontWeight:600, color:"#fff", fontFamily:FONT }}>{exercise.name}</h3>
          <div style={{ display:"flex", gap:10, marginTop:2 }}>
            {vol>0 && <span style={{ fontSize:11, color:"rgba(255,255,255,0.25)", fontFamily:MONO }}>vol: {vol.toLocaleString()}kg</span>}
            {best1RM>0 && <span style={{ fontSize:11, color:"rgba(255,255,255,0.25)", fontFamily:MONO }}>e1RM: {best1RM}kg</span>}
          </div>
        </div>
        <div style={{ display:"flex", gap:4 }}>
          <button onClick={()=>setShowNotes(!showNotes)} style={{ background:showNotes?"rgba(255,255,255,0.08)":"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:7, color:"rgba(255,255,255,0.3)", fontSize:11, padding:"4px 8px", cursor:"pointer" }}>📝</button>
          <button onClick={onRemove} style={{ background:"rgba(239,68,68,0.08)", border:"1px solid rgba(239,68,68,0.12)", borderRadius:7, color:RED, fontSize:11, padding:"4px 8px", cursor:"pointer", fontFamily:FONT }}>Remove</button>
        </div>
      </div>

      {/* Notes */}
      {showNotes && (
        <textarea value={notes||""} onChange={e=>onNotesChange(e.target.value)} placeholder="Add notes (e.g. felt tight on left shoulder, try wider grip)..."
          style={{ width:"100%", boxSizing:"border-box", background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:10, padding:"10px 12px", color:"rgba(255,255,255,0.7)", fontSize:13, fontFamily:FONT, outline:"none", resize:"vertical", minHeight:50, marginBottom:10 }} />
      )}

      {/* Previous session hint */}
      {lastSession && (
        <div style={{ padding:"8px 10px", background:"rgba(255,255,255,0.015)", borderRadius:8, marginBottom:10, border:"1px solid rgba(255,255,255,0.03)" }}>
          <span style={{ fontSize:10, color:"rgba(255,255,255,0.2)", textTransform:"uppercase", letterSpacing:1 }}>Last session</span>
          <div style={{ display:"flex", gap:8, marginTop:3, flexWrap:"wrap" }}>
            {lastSession.sets.map((s,i)=>(
              <span key={i} style={{ fontSize:11, color:"rgba(255,255,255,0.3)", fontFamily:MONO }}>{s.weight}×{s.reps}</span>
            ))}
          </div>
        </div>
      )}

      <div style={{ display:"grid", gridTemplateColumns:"32px 1fr 1fr 40px 40px", gap:8, marginBottom:4 }}>
        <span style={colHdr}>Set</span><span style={colHdr}>Weight</span><span style={colHdr}>Reps</span><span/><span/>
      </div>
      {exercise.sets.map((set,i) => (
        <div key={set.id}>
          <SetRow set={set} index={i} onUpdate={s=>updateSet(i,s)} onDelete={()=>deleteSet(i)}
            onConfirm={()=>confirmSet(i)} confirmed={set.confirmed}
            prevSet={lastSession?.sets?.[i]} />
          {restingAfterSet===i && <InlineRestTimer duration={restDuration} onDone={()=>setRestingAfterSet(null)} />}
        </div>
      ))}
      <button onClick={addSet} style={{ width:"100%", marginTop:8, padding:"9px", background:"rgba(255,255,255,0.03)", border:"1px dashed rgba(255,255,255,0.08)", borderRadius:10, color:"rgba(255,255,255,0.35)", fontSize:13, cursor:"pointer", fontFamily:FONT }}>+ Add Set</button>
    </div>
  );
}

          <button key={c||"all"} onClick={()=>setFilterMuscle(c)} style={{ ...pillBtn(filterMuscle===c), whiteSpace:"nowrap", flexShrink:0 }}>{c||"All"}</button>
        ))}
      </div>
      {/* Custom exercise */}
      {search && !EXERCISE_DB.some(e=>e.name.toLowerCase()===search.toLowerCase()) && (
        <button onClick={()=>onSelect(search)} style={{ margin:"6px 20px 0", padding:"13px", background:"rgba(34,197,94,0.1)", border:"1px solid rgba(34,197,94,0.2)", borderRadius:12, color:GREEN, fontSize:14, cursor:"pointer", textAlign:"left", fontFamily:FONT }}>
          + Add "{search}" as custom exercise

      <div style={{ padding:"4px 20px", fontSize:11, color:"rgba(255,255,255,0.15)" }}>{filtered.length} exercises</div>

          <button key={ex.name} onClick={()=>onSelect(ex.name)} style={{

            marginBottom:2, transition:"background 0.15s"

            <span>{ex.name}</span>
            <span style={{ fontSize:10, color:"rgba(255,255,255,0.2)", fontFamily:MONO }}>{ex.muscles.slice(0,2).join(", ")}</span>

// ════════════════════════════════════════════════════════════════
//  PROGRESS / STATS PAGE
// ════════════════════════════════════════════════════════════════
function ProgressPage({ history, exerciseNotes, onClose }) {
  const [selectedEx, setSelectedEx] = useState(null);
  const [tab, setTab] = useState("exercises"); // exercises | heatmap

  // Build exercise list from history
  const exerciseMap = {};
  history.forEach(w => {
    w.exercises.forEach(ex => {
      if (!exerciseMap[ex.name]) exerciseMap[ex.name] = [];
      exerciseMap[ex.name].push({ date:w.date, sets:ex.sets });
    });
  });
  const exerciseNames = Object.keys(exerciseMap).sort();

  // Muscle heatmap data (last 30 days)
  const thirtyDaysAgo = Date.now() - 30*86400000;
  const recentMuscleHits = {};
  history.filter(w=>w.date>thirtyDaysAgo).forEach(w=>{
    w.exercises.forEach(ex=>{
      const muscles = getMusclesForExercise(ex.name);
      const sets = ex.sets.filter(s=>s.weight&&s.reps).length;
      muscles.forEach(m=>{ recentMuscleHits[m] = (recentMuscleHits[m]||0) + sets; });
    });
  });

  // Absolute thresholds (sets per 30 days) based on hypertrophy science
  // ~10 sets/week = 40/month is solid; scale accordingly
  const VOLUME_CAP = 60; // for bar width scaling
  function volumeColor(sets) {
    if (sets <= 0) return "rgba(255,255,255,0.15)";
    if (sets < 10) return RED;       // under ~2-3 sets/week — undertrained
    if (sets < 20) return AMBER;     // ~3-5 sets/week — low but something
    if (sets < 35) return "#a3e635"; // ~5-9 sets/week — moderate
    return GREEN;                     // 9+ sets/week — solid volume
  }
  function volumeLabel(sets) {
    if (sets <= 0) return "Not trained";
    if (sets < 10) return "Undertrained";
    if (sets < 20) return "Low";
    if (sets < 35) return "Moderate";
    return "Solid";
  }
  const maxHits = Math.max(...Object.values(recentMuscleHits), 1);

  if (selectedEx) {
    const sessions = exerciseMap[selectedEx] || [];
    const allTimePR = sessions.reduce((best,sess)=>{
      sess.sets.forEach(s=>{const w=parseFloat(s.weight)||0; if(w>best) best=w;});
      return best;
    },0);
    const allTime1RM = sessions.reduce((best,sess)=>{
      sess.sets.forEach(s=>{const rm=calc1RM(parseFloat(s.weight)||0,parseInt(s.reps)||0); if(rm>best) best=rm;});
      return best;
    },0);
    const totalSessions = sessions.length;

    // Chart data (e1RM over time)
    const chartPoints = sessions.slice().reverse().map(sess => {
      const best = sess.sets.reduce((b,s)=>{const rm=calc1RM(parseFloat(s.weight)||0,parseInt(s.reps)||0);return rm>b?rm:b;},0);
      return { date:sess.date, value:best };
    });

    const chartMax = Math.max(...chartPoints.map(p=>p.value),1);
    const chartMin = Math.min(...chartPoints.map(p=>p.value),0);
    const range = chartMax-chartMin || 1;

    const note = exerciseNotes?.[selectedEx] || "";

    return (
      <div style={{...overlay, overflow:"auto"}}>
        <div style={topBar}>
          <button onClick={()=>setSelectedEx(null)} style={backBtn}>←</button>
          <h2 style={{ margin:0, fontSize:17, fontWeight:700, color:"#fff", flex:1 }}>{selectedEx}</h2>
        </div>
        <div style={{ padding:"16px 20px 40px", flex:1, overflow:"auto" }}>
          {/* PR Cards */}
          <div style={{ display:"flex", gap:10, marginBottom:16 }}>
            <div style={{...card, flex:1, textAlign:"center", padding:"14px 10px"}}>
              <div style={{ fontSize:24, fontWeight:700, color:AMBER, fontFamily:MONO }}>{allTimePR}kg</div>
              <div style={{ fontSize:10, color:"rgba(255,255,255,0.3)", textTransform:"uppercase", letterSpacing:1, marginTop:2 }}>Weight PR</div>
            </div>
            <div style={{...card, flex:1, textAlign:"center", padding:"14px 10px"}}>
              <div style={{ fontSize:24, fontWeight:700, color:GREEN, fontFamily:MONO }}>{allTime1RM}kg</div>
              <div style={{ fontSize:10, color:"rgba(255,255,255,0.3)", textTransform:"uppercase", letterSpacing:1, marginTop:2 }}>Est. 1RM</div>
            </div>
            <div style={{...card, flex:1, textAlign:"center", padding:"14px 10px"}}>
              <div style={{ fontSize:24, fontWeight:700, color:"rgba(255,255,255,0.7)", fontFamily:MONO }}>{totalSessions}</div>
              <div style={{ fontSize:10, color:"rgba(255,255,255,0.3)", textTransform:"uppercase", letterSpacing:1, marginTop:2 }}>Sessions</div>
            </div>
          </div>

          {/* Progress Chart */}
          {chartPoints.length > 1 && (
            <div style={{...card, padding:"16px"}}>
              <div style={{ fontSize:11, color:"rgba(255,255,255,0.25)", textTransform:"uppercase", letterSpacing:1.5, marginBottom:12 }}>Estimated 1RM Progress</div>
              <div style={{ position:"relative", height:140 }}>
                {/* Y axis labels */}
                <div style={{ position:"absolute", left:0, top:0, bottom:0, width:36, display:"flex", flexDirection:"column", justifyContent:"space-between" }}>
                  <span style={{ fontSize:10, color:"rgba(255,255,255,0.2)", fontFamily:MONO }}>{chartMax}</span>
                  <span style={{ fontSize:10, color:"rgba(255,255,255,0.2)", fontFamily:MONO }}>{chartMin}</span>
                </div>
                {/* Chart area */}
                <svg viewBox={`0 0 ${Math.max(chartPoints.length-1,1)*40+20} 120`} style={{ marginLeft:40, width:"calc(100% - 40px)", height:140 }} preserveAspectRatio="none">
                  {/* Grid lines */}
                  {[0,0.25,0.5,0.75,1].map(p=>(
                    <line key={p} x1="0" y1={p*120} x2={Math.max(chartPoints.length-1,1)*40+20} y2={p*120} stroke="rgba(255,255,255,0.04)" strokeWidth="1" />
                  ))}
                  {/* Line */}
                  <polyline fill="none" stroke={GREEN} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"
                    points={chartPoints.map((p,i)=>`${i*40+10},${120-((p.value-chartMin)/range)*110}`).join(" ")} />
                  {/* Dots */}
                  {chartPoints.map((p,i)=>(
                    <circle key={i} cx={i*40+10} cy={120-((p.value-chartMin)/range)*110} r="4" fill={GREEN} />
                  ))}
                </svg>
              </div>
              <div style={{ display:"flex", justifyContent:"space-between", marginTop:4, marginLeft:40 }}>
                <span style={{ fontSize:9, color:"rgba(255,255,255,0.15)", fontFamily:MONO }}>{formatDate(chartPoints[0]?.date)}</span>
                <span style={{ fontSize:9, color:"rgba(255,255,255,0.15)", fontFamily:MONO }}>{formatDate(chartPoints[chartPoints.length-1]?.date)}</span>
              </div>
            </div>
          )}

          {/* Notes */}
          {note && (
            <div style={{...card, padding:"12px 14px"}}>
              <div style={{ fontSize:11, color:"rgba(255,255,255,0.25)", textTransform:"uppercase", letterSpacing:1.5, marginBottom:6 }}>Notes</div>
              <p style={{ margin:0, fontSize:14, color:"rgba(255,255,255,0.5)", fontFamily:FONT, lineHeight:1.5 }}>{note}</p>
            </div>
          )}

          {/* Session History */}
          <div style={{ fontSize:11, color:"rgba(255,255,255,0.25)", textTransform:"uppercase", letterSpacing:1.5, marginBottom:8, marginTop:8 }}>Session History</div>
          {sessions.map((sess,i) => {
            const sessVol = sess.sets.reduce((s,st)=>s+(parseFloat(st.weight)||0)*(parseInt(st.reps)||0),0);
            const sess1RM = sess.sets.reduce((b,s)=>{const rm=calc1RM(parseFloat(s.weight)||0,parseInt(s.reps)||0);return rm>b?rm:b;},0);
            return (
              <div key={i} style={{...card, padding:"12px 14px"}}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                  <span style={{ fontSize:13, fontWeight:600, color:"#fff" }}>{formatFullDate(sess.date)}</span>
                  <div style={{ display:"flex", gap:8 }}>
                    <span style={{ fontSize:11, color:"rgba(255,255,255,0.25)", fontFamily:MONO }}>{sessVol}kg vol</span>
                    <span style={{ fontSize:11, color:"rgba(255,255,255,0.25)", fontFamily:MONO }}>e1RM: {sess1RM}kg</span>
                  </div>
                </div>
                <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                  {sess.sets.filter(s=>s.weight&&s.reps).map((s,j)=>(
                    <span key={j} style={{ fontSize:12, padding:"4px 8px", borderRadius:6, background:"rgba(255,255,255,0.03)", color:"rgba(255,255,255,0.4)", fontFamily:MONO }}>
                      {s.weight}kg × {s.reps}
                    </span>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  return (
    <div style={{...overlay, overflow:"auto"}}>
      <div style={topBar}>
        <button onClick={onClose} style={backBtn}>←</button>
        <h2 style={{ margin:0, fontSize:18, fontWeight:700, color:"#fff", flex:1 }}>Progress</h2>
      </div>

      {/* Tabs */}
      <div style={{ padding:"8px 20px", display:"flex", gap:8, borderBottom:"1px solid rgba(255,255,255,0.04)", flexShrink:0 }}>
        <button onClick={()=>setTab("exercises")} style={pillBtn(tab==="exercises")}>Exercises & PRs</button>
        <button onClick={()=>setTab("heatmap")} style={pillBtn(tab==="heatmap")}>Heatmap</button>
        <button onClick={()=>setTab("bodymap")} style={pillBtn(tab==="bodymap")}>Body Map</button>
      </div>

      <div style={{ flex:1, overflow:"auto", padding:"12px 20px 40px" }}>
        {tab==="exercises" && (
          <>
            {exerciseNames.length===0 && <p style={{ textAlign:"center", padding:"40px 0", color:"rgba(255,255,255,0.15)", fontSize:14 }}>Complete some workouts to see your progress</p>}
            {exerciseNames.map(name => {
              const sessions = exerciseMap[name];
              const pr = sessions.reduce((b,s)=>{s.sets.forEach(st=>{const w=parseFloat(st.weight)||0;if(w>b)b=w;});return b;},0);
              const e1rm = sessions.reduce((b,s)=>{s.sets.forEach(st=>{const rm=calc1RM(parseFloat(st.weight)||0,parseInt(st.reps)||0);if(rm>b)b=rm;});return b;},0);
              const muscles = getMusclesForExercise(name);
              return (
                <button key={name} onClick={()=>setSelectedEx(name)} style={{
                  ...card, cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center",
                  width:"100%", textAlign:"left", transition:"background 0.15s"
                }} onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.05)"}
                  onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,0.025)"}>
                  <div>
                    <div style={{ fontSize:14, fontWeight:600, color:"#fff", fontFamily:FONT }}>{name}</div>
                    <div style={{ display:"flex", gap:4, marginTop:4 }}>
                      {muscles.slice(0,3).map(m=><span key={m} style={{ fontSize:10, padding:"2px 6px", borderRadius:4, background:"rgba(255,255,255,0.04)", color:"rgba(255,255,255,0.25)" }}>{m}</span>)}
                    </div>
                  </div>
                  <div style={{ textAlign:"right" }}>
                    <div style={{ fontSize:15, fontWeight:600, color:AMBER, fontFamily:MONO }}>{pr}kg</div>
                    <div style={{ fontSize:11, color:"rgba(255,255,255,0.25)", fontFamily:MONO }}>e1RM: {e1rm}kg</div>
                    <div style={{ fontSize:10, color:"rgba(255,255,255,0.15)", fontFamily:MONO }}>{sessions.length} sessions</div>
                  </div>
                </button>
              );
            })}
          </>
        )}

        {tab==="heatmap" && (
          <>
            <p style={{ fontSize:12, color:"rgba(255,255,255,0.25)", margin:"0 0 16px" }}>Sets per muscle group — last 30 days</p>
            {Object.keys(recentMuscleHits).length===0 && <p style={{ textAlign:"center", padding:"40px 0", color:"rgba(255,255,255,0.15)", fontSize:14 }}>Complete some workouts to see your heatmap</p>}
            {Object.entries(MUSCLE_DISPLAY_MAP).map(([group, subMuscles]) => {
              const totalHits = subMuscles.reduce((s,m)=>s+(recentMuscleHits[m]||0),0);
              if (totalHits===0) return (
                <div key={group} style={{ ...card, padding:"12px 14px", display:"flex", justifyContent:"space-between", alignItems:"center", opacity:0.4 }}>

                  <span style={{ fontSize:12, color:"rgba(255,255,255,0.15)", fontFamily:MONO }}>0 sets</span>
                </div>
              );
              const barColor = volumeColor(totalHits);

              return (
                <div key={group} style={{...card, padding:"12px 14px" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
                    <span style={{ fontSize:14, fontWeight:600, color:"#fff", fontFamily:FONT }}>{group}</span>
                    <div style={{ textAlign:"right" }}>
                      <span style={{ fontSize:13, fontWeight:600, color:barColor, fontFamily:MONO }}>{totalHits} sets</span>
                      <span style={{ fontSize:10, color:"rgba(255,255,255,0.2)", marginLeft:6 }}>{volumeLabel(totalHits)}</span>
                    </div>
                  </div>
                  <div style={{ height:6, background:"rgba(255,255,255,0.04)", borderRadius:3, overflow:"hidden" }}>
                    <div style={{ height:"100%", width:`${barWidth}%`, background:barColor, borderRadius:3, transition:"width 0.5s" }} />
                  </div>
                  <div style={{ display:"flex", gap:4, marginTop:6, flexWrap:"wrap" }}>
                    {subMuscles.filter(m=>recentMuscleHits[m]).map(m=>(
                      <span key={m} style={{ fontSize:10, padding:"2px 6px", borderRadius:4, background:"rgba(255,255,255,0.03)", color:"rgba(255,255,255,0.25)" }}>{m}: {recentMuscleHits[m]}</span>
                    ))}
                  </div>
                </div>
              );
            })}
          </>
        )}

        {tab==="bodymap" && (
          <BodyMapTab recentMuscleHits={recentMuscleHits} maxHits={maxHits} />
        )}
      </div>
    </div>
  );
}

function getHeatColor(intensity, totalSets) {
  if (totalSets <= 0) return "rgba(255,255,255,0.04)";
  if (totalSets < 10) return "#7f1d1d";
  if (totalSets < 20) return "#92400e";
  if (totalSets < 35) return "#365314";
  return "#15803d";
}

function getHeatLabel(intensity, totalSets) {
  if (totalSets <= 0) return "Not trained";
  if (totalSets < 10) return "Undertrained";
  if (totalSets < 20) return "Low";
  if (totalSets < 35) return "Moderate";
  return "Solid";
}

//  CALENDAR PAGE
// ════════════════════════════════════════════════════════════════
function CalendarPage({ history, onClose }) {
  const [viewDate, setViewDate] = useState(new Date());
  const year = viewDate.getFullYear(), month = viewDate.getMonth();
  const firstDay = new Date(year,month,1).getDay();
  const daysInMonth = new Date(year,month+1,0).getDate();
  const today = new Date();

  const workoutDays = new Map();
  history.forEach(w=>{const d=new Date(w.date); if(d.getFullYear()===year&&d.getMonth()===month){const day=d.getDate();workoutDays.set(day,(workoutDays.get(day)||0)+1);}});
  const monthWorkouts = history.filter(w=>{const d=new Date(w.date);return d.getFullYear()===year&&d.getMonth()===month;});

  // ── Stats calculations ──
  const sevenDaysAgo = Date.now() - 7*86400000;
  const thirtyDaysAgo = Date.now() - 30*86400000;
  const weekWorkouts = history.filter(w=>w.date > sevenDaysAgo);
  const monthAllWorkouts = history.filter(w=>w.date > thirtyDaysAgo);

  const calcVol = (workouts) => workouts.reduce((s,w)=>s+w.exercises.reduce((a,ex)=>a+ex.sets.reduce((b,st)=>b+(parseFloat(st.weight)||0)*(parseInt(st.reps)||0),0),0),0);
  const calcSets = (workouts) => workouts.reduce((s,w)=>s+w.exercises.reduce((a,ex)=>a+ex.sets.filter(st=>st.weight&&st.reps).length,0),0);
  const calcExercises = (workouts) => { const names = new Set(); workouts.forEach(w=>w.exercises.forEach(ex=>names.add(ex.name))); return names.size; };

  const vol7d = calcVol(weekWorkouts);
  const volAll = calcVol(history);
  const sets7d = calcSets(weekWorkouts);
  const setsAll = calcSets(history);
  const uniqueExercises = calcExercises(history);

  const avgDuration = history.length > 0 ? Math.round(history.reduce((s,w)=>s+w.duration,0)/history.length) : 0;
  const avgPerWeek = history.length >= 2
    ? (history.length / Math.max(1, (Date.now() - history[history.length-1].date) / (7*86400000))).toFixed(1)
    : history.length;

  // Best single workout volume
  const bestWorkoutVol = history.reduce((best,w)=>{const v=calcVol([w]);return v>best?v:best;},0);

  const fmtVol = (v) => v >= 1000000 ? `${(v/1000000).toFixed(1)}M` : v >= 1000 ? `${(v/1000).toFixed(1)}k` : v;

  const stats = [
    { label:"This Month", value:monthWorkouts.length, unit:"workouts", color:GREEN, icon:"📅" },
    { label:"All Time", value:history.length, unit:"workouts", color:"rgba(255,255,255,0.7)", icon:"📊" },
    { label:"7-Day Volume", value:fmtVol(vol7d), unit:"kg", color:"#60a5fa", icon:"🔥" },
    { label:"All-Time Volume", value:fmtVol(volAll), unit:"kg", color:"#a78bfa", icon:"🏋️" },
    { label:"7-Day Sets", value:sets7d, unit:"sets", color:AMBER, icon:"💪" },
    { label:"All-Time Sets", value:setsAll, unit:"sets", color:"#f472b6", icon:"📈" },
    { label:"Avg / Week", value:avgPerWeek, unit:"workouts", color:GREEN, icon:"📆" },
    { label:"Avg Duration", value:formatDur(avgDuration), unit:"", color:"#38bdf8", icon:"⏱" },
    { label:"Unique Exercises", value:uniqueExercises, unit:"exercises", color:"#34d399", icon:"🎯" },
    { label:"Best Session", value:fmtVol(bestWorkoutVol), unit:"kg vol", color:AMBER, icon:"🏆" },
  ];

  const offset = (firstDay+6)%7;
  const cells = [];
  for(let i=0;i<offset;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);

  const isToday = d => d&&today.getFullYear()===year&&today.getMonth()===month&&today.getDate()===d;

  return (
    <div style={{...overlay, overflow:"auto"}}>
      <div style={topBar}>
        <button onClick={onClose} style={backBtn}>←</button>
        <h2 style={{ margin:0, fontSize:18, fontWeight:700, color:"#fff", flex:1 }}>Calendar</h2>
      </div>

      {/* ── Scrolling Stats Strip ── */}
      <div style={{ padding:"12px 0 4px", overflow:"hidden" }}>
        <div style={{
          display:"flex", gap:10, overflowX:"auto", padding:"0 20px 8px",
          WebkitOverflowScrolling:"touch", scrollbarWidth:"none", msOverflowStyle:"none"
        }}>
          <style>{`.stats-scroll::-webkit-scrollbar{display:none}`}</style>
          {stats.map((s,i) => (
            <div key={i} style={{
              flexShrink:0, width:130, padding:"14px 14px 12px",
              background:"rgba(255,255,255,0.025)", border:"1px solid rgba(255,255,255,0.05)",
              borderRadius:14, position:"relative", overflow:"hidden"
            }}>
              <div style={{ position:"absolute", top:8, right:10, fontSize:18, opacity:0.15 }}>{s.icon}</div>
              <div style={{ fontSize:10, color:"rgba(255,255,255,0.3)", textTransform:"uppercase", letterSpacing:1.2, marginBottom:6, fontFamily:FONT }}>{s.label}</div>
              <div style={{ display:"flex", alignItems:"baseline", gap:3 }}>
                <span style={{ fontSize:24, fontWeight:700, color:s.color, fontFamily:MONO, lineHeight:1 }}>{s.value}</span>
                {s.unit && <span style={{ fontSize:10, color:"rgba(255,255,255,0.2)", fontFamily:MONO }}>{s.unit}</span>}
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Month nav */}
      <div style={{ padding:"12px 20px 8px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <button onClick={()=>setViewDate(new Date(year,month-1,1))} style={{...backBtn,fontSize:18}}>‹</button>
        <span style={{ fontSize:16, fontWeight:600, color:"#fff" }}>{viewDate.toLocaleDateString("en-GB",{month:"long",year:"numeric"})}</span>
        <button onClick={()=>setViewDate(new Date(year,month+1,1))} style={{...backBtn,fontSize:18}}>›</button>
      </div>
      <div style={{ padding:"0 20px" }}>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4, marginBottom:4 }}>
          {["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(d=><div key={d} style={{ textAlign:"center", fontSize:11, color:"rgba(255,255,255,0.2)", padding:"6px 0" }}>{d}</div>)}
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4 }}>
          {cells.map((d,i)=>{
            const worked=d&&workoutDays.has(d), count=d?(workoutDays.get(d)||0):0;
            return (
              <div key={i} style={{
                aspectRatio:"1", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                borderRadius:10, fontSize:14, fontFamily:MONO,
                color:!d?"transparent":worked?"#fff":"rgba(255,255,255,0.2)",
                background:worked?"rgba(34,197,94,0.15)":"rgba(255,255,255,0.015)",
                border:isToday(d)?`1px solid ${GREEN}`:"1px solid transparent"
              }}>
                {d}
                {count>1&&<span style={{ fontSize:8, color:GREEN, marginTop:1 }}>×{count}</span>}
                {worked&&count===1&&<div style={{ width:4, height:4, borderRadius:2, background:GREEN, marginTop:2 }}/>}
              </div>
            );
          })}
        </div>
      </div>
      <div style={{ flex:1, overflow:"auto", padding:"16px 20px 40px" }}>
        <p style={{ fontSize:11, color:"rgba(255,255,255,0.25)", textTransform:"uppercase", letterSpacing:1.5, margin:"0 0 10px" }}>
          Workouts in {viewDate.toLocaleDateString("en-GB",{month:"long"})}
        </p>
        {monthWorkouts.length===0&&<p style={{color:"rgba(255,255,255,0.15)",fontSize:14,textAlign:"center",padding:"20px 0"}}>No workouts this month</p>}
        {monthWorkouts.map(w=>(
          <div key={w.id} style={{...card,padding:"12px 14px"}}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <span style={{ fontSize:14, fontWeight:600, color:"#fff" }}>{w.name}</span>
              <span style={{ fontSize:12, color:"rgba(255,255,255,0.25)", fontFamily:MONO }}>{formatFullDate(w.date)}</span>
            </div>
            <div style={{ display:"flex", gap:5, marginTop:6, flexWrap:"wrap" }}>
              {w.exercises.map((ex,j)=><span key={j} style={{fontSize:10,padding:"2px 7px",borderRadius:5,background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.35)"}}>{ex.name}</span>)}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  WORKOUT PAGE
// ════════════════════════════════════════════════════════════════
function WorkoutPage({ onFinish, onCancel, presets, history, exerciseNotes, onExerciseNotesChange }) {
  const [exercises, setExercises] = useState([]);
  const [name, setName] = useState("Workout");
  const [editingName, setEditingName] = useState(false);
  const [showPicker, setShowPicker] = useState(false);
  const [showRestSettings, setShowRestSettings] = useState(false);
  const [showPresets, setShowPresets] = useState(false);
  const [restDuration, setRestDuration] = useState(90);
  const [startedAt] = useState(Date.now());
  const [elapsed, setElapsed] = useState(0);
  const [prAlerts, setPrAlerts] = useState([]);
  const [showSummary, setShowSummary] = useState(false);
  const [finalRecord, setFinalRecord] = useState(null);
  const nameRef = useRef(null);

  useEffect(()=>{const i=setInterval(()=>setElapsed(Math.floor((Date.now()-startedAt)/1000)),1000);return()=>clearInterval(i);},[startedAt]);
  useEffect(()=>{if(editingName){nameRef.current?.focus();nameRef.current?.select();}},[editingName]);

  // Build exercise history from past workouts
  const getExerciseHistory = (exName) => {
    const sessions = [];
    history.forEach(w=>{w.exercises.forEach(ex=>{if(ex.name===exName) sessions.push({date:w.date,sets:ex.sets});});});
    return sessions;
  };

  // Check for PRs when confirming sets
  const checkPR = (exName, weight) => {
    const prevBest = history.reduce((best,w)=>{
      w.exercises.forEach(ex=>{if(ex.name===exName) ex.sets.forEach(s=>{const ww=parseFloat(s.weight)||0;if(ww>best)best=ww;});});
      return best;
    },0);
    if (parseFloat(weight) > prevBest && prevBest > 0) {
      setPrAlerts(prev=>[...prev,{id:uid(),exercise:exName,weight}]);
      setTimeout(()=>setPrAlerts(prev=>prev.slice(1)),3000);
    }
  };

  const addExercise = (n)=>{setExercises(prev=>[...prev,{id:uid(),name:n,sets:[{weight:"",reps:"",id:uid(),confirmed:false}]}]);setShowPicker(false);};
  const updateExercise = (i,ex) => {
    // Check for PR on any newly confirmed set
    const prev = exercises[i];
    ex.sets.forEach((s,j)=>{
      if(s.confirmed && (!prev.sets[j] || !prev.sets[j].confirmed)) {
        checkPR(ex.name, s.weight);
      }
    });
    const a=[...exercises];a[i]=ex;setExercises(a);
  };
  const removeExercise = (i)=>setExercises(p=>p.filter((_,idx)=>idx!==i));

  const finish = () => {
    const record = {
      id:uid(), name, date:startedAt, duration:elapsed,
      exercises:exercises.map(ex=>({name:ex.name,sets:ex.sets.map(s=>({weight:s.weight,reps:s.reps})),notes:exerciseNotes[ex.name]||""}))
    };
    setFinalRecord(record);
    setShowSummary(true);
  };

  const confirmFinish = () => {
    onFinish(finalRecord);
  };

  const loadPreset = (p)=>{
    setName(p.name);
    if (p.restTime !== undefined) setRestDuration(p.restTime);
    setExercises(p.exercises.map(ex=>({id:uid(),name:ex.name,sets:ex.sets.map(s=>({weight:s.weight,reps:s.reps,id:uid(),confirmed:false}))})));
    setShowPresets(false);
  };

  const totalSets = exercises.reduce((s,ex)=>s+ex.sets.filter(st=>st.confirmed).length,0);
  const totalVol = exercises.reduce((s,ex)=>s+ex.sets.reduce((a,st)=>a+(parseFloat(st.weight)||0)*(parseInt(st.reps)||0),0),0);

  return (
    <div style={overlay}>
      {/* PR Alert Toast */}
      {prAlerts.map((pr,i)=>(
        <div key={pr.id} style={{
          position:"fixed", top:20+i*60, left:"50%", transform:"translateX(-50%)", zIndex:200,
          background:"rgba(245,158,11,0.95)", color:"#000", padding:"12px 24px", borderRadius:14,
          fontSize:15, fontWeight:700, fontFamily:FONT, boxShadow:"0 8px 32px rgba(245,158,11,0.3)",
          animation:"fadeUp 0.3s ease both"
        }}>
          🏆 New PR! {pr.exercise}: {pr.weight}kg
        </div>
      ))}

      <style>{`@keyframes fadeUp{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}`}</style>

      <div style={{ padding:"14px 20px", display:"flex", justifyContent:"space-between", alignItems:"center", borderBottom:"1px solid rgba(255,255,255,0.05)", flexShrink:0 }}>
        <button onClick={onCancel} style={{...backBtn,fontSize:14,color:"rgba(255,255,255,0.4)"}}>✕ Cancel</button>
        <div style={{ display:"flex", gap:8 }}>
          <button onClick={()=>setShowPresets(true)} style={{ background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:9, color:"rgba(255,255,255,0.45)", fontSize:12, padding:"7px 12px", cursor:"pointer", fontFamily:FONT }}>⭐ Presets</button>
          <button onClick={finish} disabled={exercises.length===0} style={{
            background:exercises.length>0?"rgba(34,197,94,0.12)":"rgba(255,255,255,0.03)",
            border:exercises.length>0?"1px solid rgba(34,197,94,0.25)":"1px solid rgba(255,255,255,0.06)",
            borderRadius:9, color:exercises.length>0?GREEN:"rgba(255,255,255,0.2)",
            fontSize:13, fontWeight:500, padding:"7px 14px", cursor:exercises.length>0?"pointer":"default", fontFamily:FONT
          }}>Finish ✓</button>
        </div>
      </div>

      <div style={{ padding:"14px 20px 10px", flexShrink:0 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
          <span style={{ color:GREEN, fontSize:10 }}>●</span>
          {editingName ? (
            <input ref={nameRef} type="text" value={name} onChange={e=>setName(e.target.value)}
              onBlur={()=>setEditingName(false)} onKeyDown={e=>e.key==="Enter"&&setEditingName(false)}
              style={{ background:"none", border:"none", borderBottom:`2px solid ${GREEN}`, color:"#fff", fontSize:22, fontWeight:700, fontFamily:FONT, outline:"none", padding:"0 0 2px", flex:1 }} />
          ) : (
            <h2 onClick={()=>setEditingName(true)} style={{ margin:0, fontSize:22, fontWeight:700, color:"#fff", cursor:"pointer", display:"flex", alignItems:"center", gap:6 }}>
              {name} <span style={{ fontSize:13, color:"rgba(255,255,255,0.15)" }}>✎</span>
            </h2>
          )}
        </div>
        <span style={{ fontSize:13, color:"rgba(255,255,255,0.3)", fontFamily:MONO }}>{formatTimer(elapsed)}</span>
        <div style={{ display:"flex", gap:16, marginTop:12, padding:"10px 14px", background:"rgba(255,255,255,0.02)", borderRadius:11, border:"1px solid rgba(255,255,255,0.04)" }}>
          {[["Exercises",exercises.length],["Sets",totalSets],["Volume",totalVol>999?`${(totalVol/1000).toFixed(1)}k`:totalVol]].map(([l,v],i)=>(
            <div key={l} style={{ display:"flex", alignItems:"center" }}>
              {i>0&&<div style={{ width:1, height:24, background:"rgba(255,255,255,0.06)", marginRight:16 }}/>}
              <div>
                <div style={{ fontSize:10, color:"rgba(255,255,255,0.3)", textTransform:"uppercase", letterSpacing:1.2 }}>{l}</div>
                <div style={{ fontSize:18, fontWeight:600, fontFamily:MONO, color:"#fff" }}>{v}{l==="Volume"&&<span style={{fontSize:10,color:"rgba(255,255,255,0.25)",marginLeft:2}}>kg</span>}</div>
              </div>
            </div>
          ))}
          <div style={{ marginLeft:"auto", display:"flex", alignItems:"center" }}>
            <button onClick={()=>setShowRestSettings(true)} style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:9, color:"rgba(255,255,255,0.4)", fontSize:11, padding:"6px 10px", cursor:"pointer", fontFamily:MONO }}>
              ⏱ {restDuration>0?formatTimer(restDuration):"Off"}
            </button>
          </div>
        </div>
      </div>

      <div style={{ flex:1, overflow:"auto", padding:"8px 20px 100px" }}>
        {exercises.map((ex,i)=>(
          <ExerciseCard key={ex.id} exercise={ex} onUpdate={e=>updateExercise(i,e)} onRemove={()=>removeExercise(i)}
            restDuration={restDuration} exerciseHistory={getExerciseHistory(ex.name)}
            notes={exerciseNotes[ex.name]||""} onNotesChange={v=>onExerciseNotesChange(ex.name,v)} />
        ))}
        <button onClick={()=>setShowPicker(true)} style={{ width:"100%", padding:"15px", background:"rgba(34,197,94,0.07)", border:"1px solid rgba(34,197,94,0.13)", borderRadius:14, color:GREEN, fontSize:15, fontWeight:500, cursor:"pointer", fontFamily:FONT }}>+ Add Exercise</button>
      </div>

      {showPicker && <ExercisePicker onSelect={addExercise} onClose={()=>setShowPicker(false)} />}
      {showRestSettings && <RestSettings value={restDuration} onChange={setRestDuration} onClose={()=>setShowRestSettings(false)} />}
      {showPresets && <QuickPresetPicker presets={presets} onLoad={loadPreset} onClose={() => setShowPresets(false)} />}

      {/* ── Workout Complete Summary ── */}
      {showSummary && finalRecord && (() => {
        const r = finalRecord;
        const totalVolumeF = r.exercises.reduce((s,ex)=>s+ex.sets.reduce((a,st)=>a+(parseFloat(st.weight)||0)*(parseInt(st.reps)||0),0),0);
        const totalSetsF = r.exercises.reduce((s,ex)=>s+ex.sets.filter(st=>st.weight&&st.reps).length,0);
        const best1RMex = r.exercises.reduce((best,ex)=>{
          const rm = ex.sets.reduce((b,s)=>{const v=calc1RM(parseFloat(s.weight)||0,parseInt(s.reps)||0);return v>b?v:b;},0);
          return rm > best.rm ? {name:ex.name,rm} : best;
        },{name:"",rm:0});
        return (
          <div style={{ ...overlay, zIndex:120, background:"#0a0a0a", alignItems:"center", justifyContent:"center", overflow:"auto" }}>
            <style>{`
              @keyframes popIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
              @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
              @keyframes confetti{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(120px) rotate(720deg)}}
            `}</style>

            {/* Confetti dots */}
            {Array.from({length:20}).map((_,i)=>(
              <div key={i} style={{
                position:"fixed", top:-10, left:`${5+i*4.7}%`, width:6+Math.random()*6, height:6+Math.random()*6,
                borderRadius: Math.random()>0.5 ? "50%" : "2px",
                background:[GREEN,AMBER,"#60a5fa","#a78bfa","#f472b6","#34d399"][i%6],
                animation:`confetti ${1.5+Math.random()*2}s ease ${Math.random()*0.8}s both`,
                zIndex:121
              }}/>
            ))}

            <div style={{ padding:"40px 28px", maxWidth:380, width:"100%", textAlign:"center" }}>
              <div style={{ fontSize:56, marginBottom:8, animation:"popIn 0.5s ease both" }}>💪</div>
              <h2 style={{ margin:"0 0 4px", fontSize:24, fontWeight:700, color:"#fff", animation:"slideUp 0.4s ease 0.2s both" }}>Workout Complete!</h2>
              <p style={{ margin:"0 0 28px", fontSize:14, color:"rgba(255,255,255,0.35)", fontFamily:MONO, animation:"slideUp 0.4s ease 0.3s both" }}>{r.name} · {formatDur(r.duration)}</p>

              {/* Stats grid */}
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:24, animation:"slideUp 0.4s ease 0.4s both" }}>
                {[
                  { label:"Exercises", value:r.exercises.length, color:GREEN, icon:"🎯" },
                  { label:"Total Sets", value:totalSetsF, color:AMBER, icon:"💪" },
                  { label:"Volume", value:`${totalVolumeF>=1000?(totalVolumeF/1000).toFixed(1)+"k":totalVolumeF}kg`, color:"#60a5fa", icon:"🏋️" },
                  { label:"Duration", value:formatDur(r.duration), color:"#a78bfa", icon:"⏱" },
                ].map(s=>(
                  <div key={s.label} style={{ ...card, padding:"16px 12px", textAlign:"center", position:"relative", overflow:"hidden" }}>
                    <div style={{ position:"absolute", top:6, right:8, fontSize:16, opacity:0.12 }}>{s.icon}</div>
                    <div style={{ fontSize:22, fontWeight:700, color:s.color, fontFamily:MONO }}>{s.value}</div>
                    <div style={{ fontSize:10, color:"rgba(255,255,255,0.3)", textTransform:"uppercase", letterSpacing:1, marginTop:2 }}>{s.label}</div>
                  </div>
                ))}
              </div>

              {/* Best estimated 1RM */}
              {best1RMex.rm > 0 && (
                <div style={{ ...card, padding:"14px 16px", marginBottom:24, textAlign:"left", animation:"slideUp 0.4s ease 0.5s both" }}>
                  <div style={{ fontSize:10, color:"rgba(255,255,255,0.25)", textTransform:"uppercase", letterSpacing:1.5, marginBottom:6 }}>Top Estimated 1RM</div>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <span style={{ fontSize:14, color:"rgba(255,255,255,0.7)" }}>{best1RMex.name}</span>
                    <span style={{ fontSize:18, fontWeight:700, color:AMBER, fontFamily:MONO }}>{best1RMex.rm}kg</span>
                  </div>
                </div>
              )}

              {/* Exercise breakdown */}
              <div style={{ ...card, padding:"14px 16px", marginBottom:28, textAlign:"left", animation:"slideUp 0.4s ease 0.55s both" }}>
                <div style={{ fontSize:10, color:"rgba(255,255,255,0.25)", textTransform:"uppercase", letterSpacing:1.5, marginBottom:8 }}>Exercises</div>
                {r.exercises.map((ex,i) => {
                  const exSets = ex.sets.filter(s=>s.weight&&s.reps);
                  const exVol = ex.sets.reduce((a,s)=>a+(parseFloat(s.weight)||0)*(parseInt(s.reps)||0),0);
                  return (
                    <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"6px 0", borderBottom:i<r.exercises.length-1?"1px solid rgba(255,255,255,0.03)":"none" }}>
                      <span style={{ fontSize:13, color:"rgba(255,255,255,0.6)" }}>{ex.name}</span>
                      <span style={{ fontSize:11, color:"rgba(255,255,255,0.25)", fontFamily:MONO }}>{exSets.length}s · {exVol}kg</span>
                    </div>
                  );
                })}
              </div>

              <button onClick={confirmFinish} style={{
                ...btnG, width:"100%", padding:"16px", fontSize:17,
                boxShadow:`0 4px 24px rgba(34,197,94,0.25)`,
                animation:"slideUp 0.4s ease 0.6s both"
              }}>Done</button>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

//  PRESETS PAGE (standalone — add, edit, delete presets)
// ════════════════════════════════════════════════════════════════
function PresetBuilder({ preset, onSave, onClose }) {
  const [name, setName] = useState(preset?.name || "");
  const [exercises, setExercises] = useState(
    preset?.exercises?.map(ex => ({ ...ex, id: uid() })) || []
  );
  const [restTime, setRestTime] = useState(preset?.restTime ?? 90);
  const [showPicker, setShowPicker] = useState(false);
  const [showRestModal, setShowRestModal] = useState(false);
  const nameRef = useRef(null);
  useEffect(() => { nameRef.current?.focus(); }, []);

  const addExercise = (exName) => {
    setExercises(prev => [...prev, { id: uid(), name: exName, sets: [{ weight: "", reps: "" }] }]);
    setShowPicker(false);
  };

  const removeExercise = (i) => setExercises(prev => prev.filter((_, idx) => idx !== i));

  const updateSetCount = (i, count) => {
    const c = Math.max(1, Math.min(20, count));
    const ex = exercises[i];
    const currentSets = ex.sets;
    let newSets;
    if (c > currentSets.length) {
      const last = currentSets[currentSets.length - 1] || { weight: "", reps: "" };
      newSets = [...currentSets, ...Array(c - currentSets.length).fill(null).map(() => ({ weight: last.weight, reps: last.reps }))];
    } else {
      newSets = currentSets.slice(0, c);
    }
    const arr = [...exercises]; arr[i] = { ...ex, sets: newSets }; setExercises(arr);
  };

  const moveExercise = (i, dir) => {
    const j = i + dir;
    if (j < 0 || j >= exercises.length) return;
    const arr = [...exercises];
    [arr[i], arr[j]] = [arr[j], arr[i]];
    setExercises(arr);
  };

  const handleSave = () => {
    if (!name.trim() || exercises.length === 0) return;
    onSave({
      id: preset?.id || uid(),
      name: name.trim(),
      restTime,
      exercises: exercises.map(ex => ({ name: ex.name, sets: ex.sets })),
    });
  };

  const canSave = name.trim() && exercises.length > 0;

  return (
    <div style={{ ...overlay, zIndex: 100 }}>
      <div style={topBar}>
        <button onClick={onClose} style={backBtn}>←</button>
        <h2 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: "#fff", flex: 1 }}>
          {preset ? "Edit Preset" : "New Preset"}
        </h2>
        <button onClick={handleSave} disabled={!canSave} style={{
          background: canSave ? "rgba(34,197,94,0.12)" : "rgba(255,255,255,0.03)",
          border: canSave ? "1px solid rgba(34,197,94,0.25)" : "1px solid rgba(255,255,255,0.06)",
          borderRadius: 9, color: canSave ? GREEN : "rgba(255,255,255,0.2)",

        }}>Save</button>
      </div>

      <div style={{ flex: 1, overflow: "auto", padding: "16px 20px 40px" }}>
        {/* Preset name */}
        <div style={{ marginBottom: 16 }}>
          <label style={{ fontSize: 11, color: "rgba(255,255,255,0.3)", textTransform: "uppercase", letterSpacing: 1.5, display: "block", marginBottom: 6 }}>Preset Name</label>
          <input ref={nameRef} type="text" value={name} onChange={e => setName(e.target.value)}
            placeholder="e.g. Push Day, Leg Day, Upper Body..."
            style={{ width: "100%", boxSizing: "border-box", background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 12, padding: "14px 16px", color: "#fff", fontSize: 16, outline: "none", fontFamily: FONT }} />
        </div>

        {/* Rest time setting */}
        <div style={{ ...card, display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div>
            <span style={{ fontSize: 14, fontWeight: 500, color: "#fff" }}>Default Rest Time</span>
            <p style={{ margin: "2px 0 0", fontSize: 12, color: "rgba(255,255,255,0.3)" }}>Between sets when using this preset</p>
          </div>
          <button onClick={() => setShowRestModal(true)} style={{
            background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 10,
            color: restTime > 0 ? GREEN : "rgba(255,255,255,0.4)", fontSize: 15, fontWeight: 600, padding: "8px 16px",
            cursor: "pointer", fontFamily: MONO
          }}>{restTime > 0 ? formatTimer(restTime) : "Off"}</button>
        </div>

        {/* Exercise list */}
        <div style={{ marginBottom: 8 }}>
          <label style={{ fontSize: 11, color: "rgba(255,255,255,0.3)", textTransform: "uppercase", letterSpacing: 1.5, display: "block", marginBottom: 8 }}>
            Exercises ({exercises.length})
          </label>
        </div>

        {exercises.map((ex, i) => {
          const muscles = getMusclesForExercise(ex.name);
          return (
            <div key={ex.id} style={{ ...card, padding: "14px", marginBottom: 8 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <div style={{ flex: 1 }}>
                  <span style={{ fontSize: 14, fontWeight: 600, color: "#fff" }}>{ex.name}</span>
                  {muscles.length > 0 && (
                    <div style={{ display: "flex", gap: 4, marginTop: 3 }}>
                      {muscles.slice(0, 3).map(m => <span key={m} style={{ fontSize: 10, padding: "1px 6px", borderRadius: 4, background: "rgba(255,255,255,0.04)", color: "rgba(255,255,255,0.25)" }}>{m}</span>)}
                    </div>
                  )}
                </div>
                <div style={{ display: "flex", gap: 4 }}>
                  <button onClick={() => moveExercise(i, -1)} disabled={i === 0} style={{ background: "none", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 6, color: i === 0 ? "rgba(255,255,255,0.1)" : "rgba(255,255,255,0.35)", fontSize: 12, padding: "4px 8px", cursor: i === 0 ? "default" : "pointer" }}>↑</button>
                  <button onClick={() => moveExercise(i, 1)} disabled={i === exercises.length - 1} style={{ background: "none", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 6, color: i === exercises.length - 1 ? "rgba(255,255,255,0.1)" : "rgba(255,255,255,0.35)", fontSize: 12, padding: "4px 8px", cursor: i === exercises.length - 1 ? "default" : "pointer" }}>↓</button>
                  <button onClick={() => removeExercise(i)} style={{ background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.12)", borderRadius: 6, color: RED, fontSize: 12, padding: "4px 8px", cursor: "pointer" }}>✕</button>
                </div>
              </div>
              {/* Set count */}
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 12, color: "rgba(255,255,255,0.3)" }}>Sets:</span>
                <button onClick={() => updateSetCount(i, ex.sets.length - 1)} style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 6, color: "rgba(255,255,255,0.5)", fontSize: 14, width: 28, height: 28, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>−</button>
                <span style={{ fontSize: 16, fontWeight: 600, color: "#fff", fontFamily: MONO, minWidth: 20, textAlign: "center" }}>{ex.sets.length}</span>
                <button onClick={() => updateSetCount(i, ex.sets.length + 1)} style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 6, color: "rgba(255,255,255,0.5)", fontSize: 14, width: 28, height: 28, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>+</button>
              </div>
            </div>
          );
        })}

        <button onClick={() => setShowPicker(true)} style={{
          width: "100%", padding: "15px", background: "rgba(34,197,94,0.07)", border: "1px solid rgba(34,197,94,0.13)",
          borderRadius: 14, color: GREEN, fontSize: 15, fontWeight: 500, cursor: "pointer", fontFamily: FONT
        }}>+ Add Exercise</button>
      </div>

      {showPicker && <ExercisePicker onSelect={addExercise} onClose={() => setShowPicker(false)} />}
      {showRestModal && <RestSettings value={restTime} onChange={setRestTime} onClose={() => setShowRestModal(false)} />}
    </div>
  );
}

function FullHistoryPage({ history, onDelete, onClose }) {
  return (
    <div style={{...overlay, overflow:"auto"}}>
      <div style={topBar}>
        <button onClick={onClose} style={backBtn}>←</button>
        <h2 style={{ margin:0, fontSize:18, fontWeight:700, color:"#fff", flex:1 }}>All Workouts</h2>
        <span style={{ fontSize:12, color:"rgba(255,255,255,0.25)", fontFamily:MONO }}>{history.length}</span>
      </div>
      <div style={{ padding:"12px 20px 40px", flex:1, overflow:"auto" }}>
        {history.map((w,idx)=>{
          const vol=w.exercises.reduce((s,ex)=>s+ex.sets.reduce((a,st)=>a+(parseFloat(st.weight)||0)*(parseInt(st.reps)||0),0),0);
          const sets=w.exercises.reduce((s,ex)=>s+ex.sets.filter(st=>st.weight&&st.reps).length,0);
          return (
            <div key={w.id} style={{...card, padding:"14px"}}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:6 }}>
                <div>
                  <h3 style={{margin:0,fontSize:15,fontWeight:600,color:"#fff"}}>{w.name}</h3>
                  <div style={{ display:"flex", gap:8, marginTop:3 }}>
                    <span style={{fontSize:12,color:"rgba(255,255,255,0.3)",fontFamily:MONO}}>{formatFullDate(w.date)}</span>
                    <span style={{fontSize:12,color:"rgba(255,255,255,0.2)",fontFamily:MONO}}>{formatDur(w.duration)}</span>
                  </div>
                </div>
                <button onClick={()=>onDelete(w.id)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.1)",fontSize:13,cursor:"pointer",padding:4}}
                  onMouseEnter={e=>e.target.style.color=RED} onMouseLeave={e=>e.target.style.color="rgba(255,255,255,0.1)"}>🗑</button>
              </div>
              {w.exercises.map((ex,j)=>{
                const exSets=ex.sets.filter(s=>s.weight&&s.reps);
                const best=exSets.reduce((b,s)=>{const ww=parseFloat(s.weight)||0;return ww>((parseFloat(b.weight))||0)?s:b;},exSets[0]||{});
                return (
                  <div key={j} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"4px 0", borderTop:j===0?"1px solid rgba(255,255,255,0.04)":"none" }}>
                    <span style={{fontSize:13,color:"rgba(255,255,255,0.6)"}}>{ex.name}</span>
                    <span style={{fontSize:11,color:"rgba(255,255,255,0.25)",fontFamily:MONO}}>{exSets.length}s {best.weight?`· ${best.weight}kg×${best.reps}`:""}</span>
                  </div>
                );
              })}
              <div style={{ display:"flex", gap:10, marginTop:6, paddingTop:6, borderTop:"1px solid rgba(255,255,255,0.04)" }}>
                <span style={{fontSize:11,color:"rgba(255,255,255,0.2)",fontFamily:MONO}}>{sets} sets</span>
                <span style={{fontSize:11,color:"rgba(255,255,255,0.2)",fontFamily:MONO}}>{vol>=1000?(vol/1000).toFixed(1)+"k":vol}kg vol</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function GymTracker() {
  const [history, setHistory] = useState([]);
  const [presets, setPresets] = useState([]);
  const [exerciseNotes, setExerciseNotes] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [page, setPage] = useState("home");

  useEffect(()=>{(async()=>{
    const h=await load("gym-history",[]);
    const p=await load("gym-presets",[]);
    const n=await load("gym-notes",{});
    setHistory(h);setPresets(p);setExerciseNotes(n);setLoaded(true);
  })();},[]);

  const finishWorkout = async(record)=>{const h=[record,...history];setHistory(h);await save("gym-history",h);setPage("home");};
  const deleteWorkout = async(id)=>{const h=history.filter(w=>w.id!==id);setHistory(h);await save("gym-history",h);};
  const savePreset = async(preset)=>{
    // If preset with same id exists, update it; otherwise add new
    const exists = presets.findIndex(p => p.id === preset.id);
    let p;
    if (exists >= 0) { p = [...presets]; p[exists] = preset; }
    else { p = [preset, ...presets]; }
    setPresets(p); await save("gym-presets", p);
  };
  const deletePreset = async(id)=>{const p=presets.filter(x=>x.id!==id);setPresets(p);await save("gym-presets",p);};
  const updateNotes = async(exName,note)=>{const n={...exerciseNotes,[exName]:note};setExerciseNotes(n);await save("gym-notes",n);};

  if (!loaded) return <div style={{minHeight:"100vh",background:"#0a0a0a",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"rgba(255,255,255,0.25)",fontFamily:FONT}}>Loading...</span></div>;

  if (page==="workout") return <WorkoutPage onFinish={finishWorkout} onCancel={()=>setPage("home")} presets={presets} history={history} exerciseNotes={exerciseNotes} onExerciseNotesChange={updateNotes} />;
  if (page==="calendar") return <CalendarPage history={history} onClose={()=>setPage("home")} />;
  if (page==="progress") return <ProgressPage history={history} exerciseNotes={exerciseNotes} onClose={()=>setPage("home")} />;
  if (page==="presets") return <PresetsPage presets={presets} onSave={savePreset} onDelete={deletePreset} onClose={()=>setPage("home")} />;
  if (page==="history") return <FullHistoryPage history={history} onDelete={deleteWorkout} onClose={()=>setPage("home")} />;

  const weekAgo = Date.now() - 7*86400000;
  const weekW = history.filter(w => w.date > weekAgo);

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(180deg, #0a0a0a 0%, #111 50%, #0d0d0d 100%)", color:"#fff", fontFamily:FONT, maxWidth:480, margin:"0 auto", position:"relative" }}>
      <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
      <style>{`@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}`}</style>

      {/* Header */}
      <div style={{ padding:"24px 20px 16px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div>
          <h1 style={{ margin:0, fontSize:26, fontWeight:700, letterSpacing:-0.5 }}>Iron<span style={{color:GREEN}}>Log</span></h1>
          <p style={{ margin:"2px 0 0", fontSize:13, color:"rgba(255,255,255,0.3)", fontFamily:MONO }}>
            {weekW.length>0?`${weekW.length} workout${weekW.length>1?"s":""} this week`:"No workouts this week yet"}
          </p>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <button onClick={()=>setPage("presets")} style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:12, color:"rgba(255,255,255,0.5)", fontSize:20, padding:"10px 14px", cursor:"pointer", lineHeight:1 }}>⭐</button>
          <button onClick={()=>setPage("progress")} style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:12, color:"rgba(255,255,255,0.5)", fontSize:20, padding:"10px 14px", cursor:"pointer", lineHeight:1 }}>📊</button>
          <button onClick={()=>setPage("calendar")} style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:12, color:"rgba(255,255,255,0.5)", fontSize:20, padding:"10px 14px", cursor:"pointer", lineHeight:1 }}>📅</button>
        </div>
      </div>

      {/* Start Workout */}
      <div style={{ padding:"0 20px 16px" }}>
        <button onClick={()=>setPage("workout")} style={{
          width:"100%", padding:"18px", background:`linear-gradient(135deg, ${GREEN}dd 0%, ${GREEN} 100%)`,
          border:"none", borderRadius:14, color:"#000", fontSize:17, fontWeight:700,
          cursor:"pointer", fontFamily:FONT, letterSpacing:0.3, boxShadow:"0 4px 24px rgba(34,197,94,0.2)",
          transition:"transform 0.15s, box-shadow 0.15s"
        }} onMouseEnter={e=>{e.target.style.transform="translateY(-1px)";e.target.style.boxShadow="0 6px 32px rgba(34,197,94,0.3)";}}
          onMouseLeave={e=>{e.target.style.transform="translateY(0)";e.target.style.boxShadow="0 4px 24px rgba(34,197,94,0.2)";}}>
          + Start New Workout
        </button>
      </div>

      {/* History Feed — last 7 only, condensed */}
      <div style={{ padding:"0 20px 40px" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
          <span style={{ fontSize:12, color:"rgba(255,255,255,0.25)", textTransform:"uppercase", letterSpacing:1.5 }}>Recent Workouts</span>
          <span style={{ fontSize:12, color:"rgba(255,255,255,0.15)", fontFamily:MONO }}>{history.length} total</span>
        </div>

        {history.length===0 && (
          <div style={{ textAlign:"center", padding:"50px 20px", color:"rgba(255,255,255,0.15)" }}>
            <div style={{ fontSize:44, marginBottom:14 }}>🏋️</div>
            <p style={{ fontSize:16, fontWeight:500, margin:"0 0 4px" }}>No workouts yet</p>
            <p style={{ fontSize:13, margin:0 }}>Hit the button above to start</p>
          </div>
        )}

        {history.slice(0,7).map((w,idx)=>{
          const vol=w.exercises.reduce((s,ex)=>s+ex.sets.reduce((a,st)=>a+(parseFloat(st.weight)||0)*(parseInt(st.reps)||0),0),0);
          const sets=w.exercises.reduce((s,ex)=>s+ex.sets.filter(st=>st.weight&&st.reps).length,0);
          return (
            <div key={w.id} style={{
              ...card, padding:"12px 14px", animation:`fadeUp 0.3s ease ${idx*0.04}s both`,
              display:"flex", justifyContent:"space-between", alignItems:"center"
            }}>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <h3 style={{margin:0,fontSize:15,fontWeight:600,color:"#fff",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{w.name}</h3>
                  <span style={{fontSize:11,color:"rgba(255,255,255,0.2)",fontFamily:MONO,flexShrink:0}}>{formatDate(w.date)}</span>
                </div>
                <div style={{ display:"flex", gap:8, marginTop:4 }}>
                  <span style={{fontSize:11,color:"rgba(255,255,255,0.25)",fontFamily:MONO}}>{w.exercises.length} exercises</span>
                  <span style={{fontSize:11,color:"rgba(255,255,255,0.2)",fontFamily:MONO}}>{sets}s</span>
                  <span style={{fontSize:11,color:"rgba(255,255,255,0.2)",fontFamily:MONO}}>{vol>=1000?(vol/1000).toFixed(1)+"k":vol}kg</span>
                  <span style={{fontSize:11,color:"rgba(255,255,255,0.15)",fontFamily:MONO}}>{formatDur(w.duration)}</span>
                </div>
              </div>
              <button onClick={()=>deleteWorkout(w.id)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.08)",fontSize:13,cursor:"pointer",padding:"4px 4px 4px 8px",flexShrink:0}}
                onMouseEnter={e=>e.target.style.color=RED} onMouseLeave={e=>e.target.style.color="rgba(255,255,255,0.08)"}>🗑</button>
            </div>
          );
        })}

        {/* See all history */}
        {history.length > 7 && (
          <button onClick={()=>setPage("history")} style={{
            width:"100%", marginTop:8, padding:"14px", background:"rgba(255,255,255,0.025)",
            border:"1px solid rgba(255,255,255,0.06)", borderRadius:12, color:"rgba(255,255,255,0.4)",
            fontSize:14, cursor:"pointer", fontFamily:FONT, transition:"background 0.15s"
          }} onMouseEnter={e=>e.target.style.background="rgba(255,255,255,0.05)"}
            onMouseLeave={e=>e.target.style.background="rgba(255,255,255,0.025)"}>
            See all {history.length} workouts →
          </button>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(GymTracker));
</script>
</body>
</html>
